name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.4)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binaries
        run: bash scripts/build-release.sh

      - name: Verify binaries
        run: |
          ls -lh dist/
          ./dist/heartbeat-linux-x64 --version

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: |
            dist/heartbeat-darwin-arm64
            dist/heartbeat-darwin-x64
            dist/heartbeat-linux-x64
          body: ${{ steps.changelog.outputs.notes }}
